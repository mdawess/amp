name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go test ./...
      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=darwin  GOARCH=arm64 go build -o dist/amp-darwin-arm64  ./cmd/amp
          GOOS=darwin  GOARCH=amd64 go build -o dist/amp-darwin-amd64  ./cmd/amp
          GOOS=linux   GOARCH=amd64 go build -o dist/amp-linux-amd64   ./cmd/amp
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
